<style>
/* ===== Web Fonts ===== */
@import url('https://fonts.googleapis.com/css2?family=Gaegu:wght@300;400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

/* ===== CSS Variables ===== */
:root {
  --bg: #FFF7ED;
  --card: #FFFDF8;
  --text: #3E2D25;
  --text-sub: #7A685E;
  --cta: #FF7A59;
  --cta-hover: #E8694A;
  --accent: #FFC857;
  --prism: linear-gradient(135deg, #FF8A5B, #FFD166, #7BDFF2, #B8F2E6);
  --prism-subtle: linear-gradient(135deg, rgba(255,138,91,0.15), rgba(255,209,102,0.15), rgba(123,223,242,0.15), rgba(184,242,230,0.15));
  --shadow-soft: 0 2px 16px rgba(62,45,37,0.06);
  --shadow-card: 0 4px 24px rgba(62,45,37,0.08);
  --shadow-glow: 0 0 32px rgba(255,122,89,0.15);
  --radius: 20px;
  --radius-sm: 12px;
  --transition: 220ms cubic-bezier(0.4, 0, 0.2, 1);
}

/* ===== Reset & Base ===== */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

html {
  font-size: 16px;
  -webkit-text-size-adjust: 100%;
  scroll-behavior: smooth;
}

body {
  font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ===== App Container ===== */
.app {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100dvh;
  position: relative;
  overflow: hidden;
}

/* ===== Background Decoration ===== */
.app::before {
  content: '';
  position: fixed;
  top: -120px;
  right: -80px;
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(255,200,87,0.12) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
}

.app::after {
  content: '';
  position: fixed;
  bottom: -100px;
  left: -60px;
  width: 260px;
  height: 260px;
  background: radial-gradient(circle, rgba(123,223,242,0.1) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
}

/* ===== Progress Bar ===== */
.progress-bar {
  position: fixed;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  z-index: 100;
  padding: 16px 24px 12px;
  background: linear-gradient(180deg, var(--bg) 60%, transparent);
  display: none;
}

.progress-bar.visible {
  display: flex;
  align-items: center;
  gap: 12px;
}

.progress-text {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-sub);
  white-space: nowrap;
  min-width: 28px;
}

.progress-dots {
  display: flex;
  gap: 8px;
  align-items: center;
}

.progress-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: rgba(62,45,37,0.1);
  transition: all var(--transition);
}

.progress-dot.active {
  background: var(--cta);
  box-shadow: 0 0 8px rgba(255,122,89,0.35);
  transform: scale(1.15);
}

.progress-dot.done {
  background: var(--accent);
}

/* ===== Sections ===== */
.section {
  display: none;
  min-height: 100dvh;
  padding: 72px 24px 40px;
  flex-direction: column;
  position: relative;
  z-index: 1;
  opacity: 0;
  transform: translateY(12px);
}

.section.active {
  display: flex;
  animation: sectionIn 320ms cubic-bezier(0.4, 0, 0.2, 1) forwards;
}

@keyframes sectionIn {
  from { opacity: 0; transform: translateY(14px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== Intro Screen ===== */
.intro {
  justify-content: center;
  align-items: center;
  text-align: center;
  padding-top: 0;
  gap: 0;
}

.intro-brand {
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-sub);
  margin-bottom: 20px;
}

.intro-cookie {
  width: 140px;
  height: 140px;
  margin: 0 auto 28px;
  position: relative;
}

.cookie-body {
  width: 100%;
  height: 100%;
  position: relative;
  animation: cookieFloat 3s ease-in-out infinite;
}

@keyframes cookieFloat {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-8px) rotate(2deg); }
}

.cookie-svg {
  width: 100%;
  height: 100%;
}

.intro-title {
  font-family: 'Gaegu', cursive;
  font-size: 36px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.2;
  margin-bottom: 12px;
}

.intro-subtitle {
  font-size: 17px;
  color: var(--text);
  font-weight: 400;
  margin-bottom: 8px;
}

.intro-desc {
  font-size: 14px;
  color: var(--text-sub);
  line-height: 1.6;
  margin-bottom: 40px;
  max-width: 300px;
}

/* ===== Question Screens ===== */
.question-section {
  padding-top: 80px;
}

.question-header {
  margin-bottom: 8px;
}

.question-title {
  font-family: 'Gaegu', cursive;
  font-size: 26px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.35;
  margin-bottom: 12px;
}

.question-helper {
  font-size: 14px;
  color: var(--text-sub);
  line-height: 1.5;
  margin-bottom: 28px;
}

/* ===== Choice Cards ===== */
.choices {
  display: flex;
  flex-direction: column;
  gap: 12px;
  flex: 1;
}

.choice-card {
  background: var(--card);
  border: 2px solid transparent;
  border-radius: var(--radius-sm);
  padding: 18px 20px;
  font-size: 16px;
  font-weight: 400;
  color: var(--text);
  cursor: pointer;
  transition: all var(--transition);
  box-shadow: var(--shadow-soft);
  text-align: left;
  position: relative;
  overflow: hidden;
  min-height: 56px;
  display: flex;
  align-items: center;
  -webkit-user-select: none;
  user-select: none;
}

.choice-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--prism-subtle);
  opacity: 0;
  transition: opacity var(--transition);
}

.choice-card:active {
  transform: scale(0.98);
}

.choice-card.selected {
  border-color: var(--cta);
  background: #FFF5F0;
  transform: scale(1.02);
  box-shadow: var(--shadow-glow);
}

.choice-card.selected::before {
  opacity: 1;
}

.choice-icon {
  margin-right: 14px;
  font-size: 22px;
  flex-shrink: 0;
}

/* ===== Info Screen ===== */
.info-section {
  padding-top: 80px;
}

.info-header {
  margin-bottom: 28px;
}

.info-title {
  font-family: 'Gaegu', cursive;
  font-size: 28px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
}

.info-desc {
  font-size: 14px;
  color: var(--text-sub);
  line-height: 1.5;
}

.form-group {
  margin-bottom: 20px;
}

.form-label {
  display: block;
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 8px;
}

.form-input {
  width: 100%;
  padding: 16px 18px;
  border: 2px solid rgba(62,45,37,0.1);
  border-radius: var(--radius-sm);
  font-size: 16px;
  font-family: inherit;
  color: var(--text);
  background: var(--card);
  transition: border-color var(--transition);
  outline: none;
  -webkit-appearance: none;
}

.form-input:focus {
  border-color: var(--cta);
}

.form-input::placeholder {
  color: rgba(62,45,37,0.3);
}

.form-input.error {
  border-color: #E85A4F;
  animation: shake 300ms ease;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-4px); }
  75% { transform: translateX(4px); }
}

.error-msg {
  font-size: 12px;
  color: #E85A4F;
  margin-top: 6px;
  display: none;
}

.error-msg.visible {
  display: block;
}

/* ===== Interest Chips ===== */
.interest-section {
  margin-top: 8px;
  margin-bottom: 24px;
}

.interest-label {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 12px;
}

.interest-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.interest-chip {
  padding: 10px 16px;
  border-radius: 24px;
  border: 1.5px solid rgba(62,45,37,0.12);
  background: var(--card);
  font-size: 14px;
  color: var(--text-sub);
  cursor: pointer;
  transition: all var(--transition);
  -webkit-user-select: none;
  user-select: none;
}

.interest-chip.selected {
  border-color: var(--cta);
  background: #FFF5F0;
  color: var(--cta);
  font-weight: 500;
}

.interest-chip:active {
  transform: scale(0.97);
}

.privacy-note {
  font-size: 12px;
  color: var(--text-sub);
  line-height: 1.5;
  margin-bottom: 28px;
  opacity: 0.7;
}

/* ===== CTA Button ===== */
.btn-cta {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: 18px 24px;
  background: var(--cta);
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 17px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: all var(--transition);
  box-shadow: 0 4px 16px rgba(255,122,89,0.3);
  min-height: 56px;
  position: relative;
  overflow: hidden;
  -webkit-user-select: none;
  user-select: none;
}

.btn-cta::after {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--prism);
  opacity: 0;
  transition: opacity 400ms;
}

.btn-cta:active {
  transform: scale(0.98);
}

.btn-cta:hover::after {
  opacity: 0.15;
}

.btn-cta:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  box-shadow: none;
}

/* ===== Loading Screen ===== */
.loading-section {
  justify-content: center;
  align-items: center;
  text-align: center;
  padding-top: 0;
}

.loading-cookie {
  width: 120px;
  height: 120px;
  margin-bottom: 32px;
  animation: loadingSpin 2s ease-in-out infinite;
}

@keyframes loadingSpin {
  0% { transform: rotate(0deg) scale(1); }
  25% { transform: rotate(5deg) scale(1.05); }
  50% { transform: rotate(0deg) scale(1); }
  75% { transform: rotate(-5deg) scale(1.05); }
  100% { transform: rotate(0deg) scale(1); }
}

.loading-glow {
  width: 160px;
  height: 160px;
  position: absolute;
  border-radius: 50%;
  background: var(--prism);
  opacity: 0.12;
  filter: blur(40px);
  animation: glowPulse 2s ease-in-out infinite;
}

@keyframes glowPulse {
  0%, 100% { transform: scale(0.9); opacity: 0.08; }
  50% { transform: scale(1.2); opacity: 0.18; }
}

.loading-title {
  font-family: 'Gaegu', cursive;
  font-size: 24px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
}

.loading-desc {
  font-size: 14px;
  color: var(--text-sub);
}

/* ===== Result Screen ===== */
.result-section {
  justify-content: center;
  align-items: center;
  padding-top: 60px;
  padding-bottom: 40px;
}

.result-label {
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-sub);
  margin-bottom: 8px;
}

.result-title {
  font-family: 'Gaegu', cursive;
  font-size: 24px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 28px;
  text-align: center;
}

.result-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 32px 24px;
  box-shadow: var(--shadow-card);
  width: 100%;
  position: relative;
  overflow: hidden;
  margin-bottom: 32px;
}

.result-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: var(--prism);
}

.result-card::after {
  content: '';
  position: absolute;
  bottom: -40px;
  right: -40px;
  width: 120px;
  height: 120px;
  background: radial-gradient(circle, rgba(255,200,87,0.08) 0%, transparent 70%);
  border-radius: 50%;
}

.result-message {
  font-size: 16px;
  line-height: 1.75;
  color: var(--text);
}

.result-message p {
  margin-bottom: 16px;
}

.result-message p:last-child {
  margin-bottom: 0;
}

.result-message p:first-child {
  font-weight: 500;
}

.result-message p:last-child {
  color: var(--cta);
  font-weight: 500;
}

.result-capture-hint {
  font-size: 12px;
  color: var(--text-sub);
  text-align: center;
  margin-bottom: 24px;
  opacity: 0.7;
}

.result-actions {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.btn-insta {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 16px 24px;
  background: var(--prism);
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 16px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: all var(--transition);
  box-shadow: 0 4px 16px rgba(255,122,89,0.2);
  min-height: 56px;
  text-decoration: none;
}

.btn-insta:active {
  transform: scale(0.98);
}

.btn-retry {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: 16px 24px;
  background: transparent;
  color: var(--text-sub);
  border: 1.5px solid rgba(62,45,37,0.12);
  border-radius: var(--radius-sm);
  font-size: 15px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  transition: all var(--transition);
  min-height: 56px;
}

.btn-retry:active {
  transform: scale(0.98);
  background: rgba(62,45,37,0.03);
}

/* ===== Toast ===== */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--text);
  color: white;
  padding: 14px 24px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 500;
  z-index: 200;
  transition: transform 300ms cubic-bezier(0.4, 0, 0.2, 1);
  white-space: nowrap;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
}

.toast.visible {
  transform: translateX(-50%) translateY(0);
}

/* ===== Utility ===== */
.spacer { flex: 1; }

/* ===== Safe Area ===== */
@supports (padding-bottom: env(safe-area-inset-bottom)) {
  .section {
    padding-bottom: calc(40px + env(safe-area-inset-bottom));
  }
}
</style>
